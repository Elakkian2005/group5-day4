<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0a1f 0%, #1a0f3a 25%, #0d1a2e 50%, #1f0a3a 75%, #0a0f1a 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background-color: white;
            border-radius: 25px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            overflow: hidden;
            animation: slideIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%);
            color: white;
            padding: 55px 40px;
            text-align: center;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.5);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            animation: pulse 6s ease-in-out infinite;
        }

        .header::after {
            content: '✨';
            position: absolute;
            right: 40px;
            top: 20px;
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
            opacity: 0.8;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(-5px) rotate(0deg);
            }
            50% {
                transform: translateY(5px) rotate(10deg);
            }
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 15px;
            animation: spin 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(240, 147, 251, 0.6));
            display: inline-block;
        }

        @keyframes spin {
            0% {
                transform: rotateY(0deg) scale(1);
            }
            50% {
                transform: rotateY(180deg) scale(1.1);
            }
            100% {
                transform: rotateY(360deg) scale(1);
            }
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 30px 40px;
            background: linear-gradient(to right, 
                rgba(26, 31, 46, 0.8) 0%, 
                rgba(31, 18, 50, 0.6) 50%,
                rgba(26, 31, 46, 0.8) 100%);
            border-bottom: 2px dotted rgba(102, 126, 234, 0.15);
            flex-wrap: wrap;
            gap: 30px;
            position: relative;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px 25px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.08));
            backdrop-filter: blur(10px);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(240, 147, 251, 0.12));
        }

        .stat-label {
            font-size: 12px;
            color: #a0a8c0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
        }

        .clear-button-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-all-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .clear-all-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .clear-all-btn:hover::before {
            left: 100%;
        }

        .clear-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(239, 68, 68, 0.55);
        }

        .clear-all-btn:active {
            transform: translateY(0);
        }

        .clear-all-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .input-section {
            display: flex;
            gap: 15px;
            padding: 40px;
            background: linear-gradient(to bottom, 
                rgba(26, 31, 46, 0.8), 
                rgba(55, 20, 20, 0.6),
                rgba(26, 31, 46, 0.5));
            border-bottom: 3px solid rgba(239, 68, 68, 0.15);
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            flex-wrap: wrap;
            align-items: center;
        }

        .select-label {
            font-size: 13px;
            font-weight: 800;
            color: #ff9999;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
            display: block;
            width: 100%;
        }

        .name-select {
            padding: 16px 20px;
            border: 2px solid rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.9) 0%, rgba(239, 68, 68, 0.1) 100%);
            cursor: pointer;
            min-width: 280px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.25);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff9999' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 45px;
        }

        .name-select option {
            background: #2a2a2a;
            color: #ffffff;
            font-weight: 700;
            padding: 10px;
        }

        .name-select option:checked {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .name-select:hover {
            border-color: #ef4444;
            box-shadow: 0 10px 35px rgba(239, 68, 68, 0.45);
            transform: translateY(-3px);
            background-color: rgba(26, 31, 46, 1);
        }

        .name-select:focus {
            outline: none;
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.35), 0 10px 35px rgba(239, 68, 68, 0.35);
            transform: translateY(-3px);
        }

        .idea-input {
            flex: 1;
            padding: 16px 20px;
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            font-size: 15px;
            color: #e0e0e0;
            background: linear-gradient(135deg, rgba(26, 31, 46, 0.8) 0%, rgba(239, 68, 68, 0.05) 100%);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 280px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .idea-input:hover {
            border-color: #dc2626;
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.3);
            transform: translateY(-2px);
        }

        .idea-input:focus {
            outline: none;
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        .idea-input::placeholder {
            color: #6a7280;
        }

        .add-btn {
            padding: 16px 45px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #15803d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.5);
            position: relative;
            overflow: hidden;
        }

        .add-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .add-btn:hover::before {
            left: 100%;
        }

        .add-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 45px rgba(34, 197, 94, 0.65);
        }

        .add-btn:active {
            transform: translateY(-1px);
        }

        .ideas-list {
            padding: 45px;
            min-height: 400px;
            background: linear-gradient(135deg, rgba(15, 10, 31, 0.6) 0%, rgba(26, 31, 46, 0.5) 50%, rgba(31, 10, 58, 0.6) 100%);
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #6a7280;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 25px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 5px 15px rgba(102, 126, 234, 0.2));
        }

        .empty-state-text {
            font-size: 18px;
            font-weight: 600;
            color: #8892b0;
            letter-spacing: 0.5px;
        }

        .idea-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 25px 28px;
            background: linear-gradient(135deg, rgba(35, 40, 55, 0.8) 0%, rgba(70, 40, 40, 0.6) 50%, rgba(35, 40, 55, 0.8) 100%);
            border-radius: 16px;
            border: 2px solid rgba(239, 68, 68, 0.2);
            border-left: 6px solid;
            border-image: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%) 1;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInRight 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .idea-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: left 0.8s ease;
        }

        .idea-item:hover::before {
            left: 100%;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .idea-item:hover {
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.35);
            transform: translateX(6px) translateY(-2px);
            background: linear-gradient(135deg, rgba(50, 55, 75, 0.9) 0%, rgba(66, 50, 90, 0.75) 50%, rgba(50, 55, 75, 0.9) 100%);
            border-color: rgba(102, 126, 234, 0.4);
        }

        .idea-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .idea-item-text {
            font-weight: 800;
            color: #e0e0e0;
            font-size: 16px;
            letter-spacing: 0.3px;
        }

        .idea-item-author {
            font-size: 13px;
            color: #a78bfa;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .idea-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
            color: white;
            border-radius: 50%;
            font-weight: 900;
            font-size: 18px;
            margin-right: 20px;
            flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35);
            animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 10px rgba(255, 107, 107, 0.3);
            margin-left: 12px;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(255, 107, 107, 0.4);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .idea-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .like-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 10px rgba(255, 107, 157, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .like-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(255, 107, 157, 0.4);
        }

        .like-btn:active {
            transform: translateY(0);
        }

        .like-btn.liked {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            animation: heartBeat 0.4s ease;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }

        .like-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background-color: #fff5f7;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #c44569;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1f2e 0%, #242d42 50%, #1a1f2e 100%);
            border-radius: 25px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.6),
                        0 0 0 1px rgba(102, 126, 234, 0.2) inset;
            overflow: hidden;
            animation: slideIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 768px) {
            .input-section {
                flex-direction: column;
                gap: 12px;
                padding: 25px;
            }

            .input-wrapper {
                flex-direction: column;
                gap: 12px;
            }

            .name-select,
            .idea-input {
                min-width: 100%;
                width: 100%;
            }

            .add-btn {
                width: 100%;
                padding: 12px 24px;
            }

            .header {
                font-size: 28px;
                padding: 40px 20px;
            }

            .logo-icon {
                font-size: 40px;
                margin-bottom: 12px;
            }

            .stats-bar {
                padding: 15px 20px;
                gap: 15px;
                justify-content: center;
            }

            .clear-button-wrapper {
                width: 100%;
            }

            .clear-all-btn {
                width: 100%;
                font-size: 12px;
                padding: 10px 16px;
            }

            .ideas-list {
                padding: 25px;
            }

            .idea-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                margin-bottom: 15px;
            }

            .idea-number {
                margin-right: 0;
                margin-bottom: 10px;
            }

            .idea-actions {
                margin-left: 0;
                width: 100%;
                justify-content: flex-start;
                gap: 8px;
            }

            .like-btn,
            .delete-btn {
                margin-left: 0;
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-icon">💡</div>
            <div class="header-content">GROUP 5 IDEA BOARD</div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Total Ideas</div>
                <div class="stat-value" id="ideaCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Contributors</div>
                <div class="stat-value" id="contributorCount">0</div>
            </div>
            <div class="clear-button-wrapper">
                <button class="clear-all-btn" id="clearAllBtn" title="Clear all ideas">🗑️ Clear All</button>
            </div>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <label class="select-label">👤 SELECT YOUR NAME</label>
                <select class="name-select" id="nameSelect">
                    <option value="">Select your name...</option>
                    <option value="kenula">Kenula</option>
                    <option value="rhenold">Rhenold</option>
                    <option value="hasindu">Hasindu</option>
                    <option value="sinethya">Sinethya</option>
                    <option value="ishadi">Ishadi</option>
                    <option value="bineth">Bineth</option>
                    <option value="venuja">Venuja</option>
                    <option value="shemaya">Shemaya</option>
                    <option value="lisara">Lisara</option>
                    <option value="elakki">Elakki</option>
                </select>

                <input 
                    type="text" 
                    class="idea-input" 
                    id="ideaInput" 
                    placeholder="Enter your idea here..."
                >

                <button class="add-btn" id="addBtn">Add Idea</button>
            </div>
        </div>

        <div class="ideas-list" id="ideasList">
            <div class="empty-state">
                <div class="empty-state-icon">💭</div>
                <div class="empty-state-text">No ideas yet. Be the first to share an idea!</div>
            </div>
        </div>
    </div>

    <script>
        const nameSelect = document.getElementById('nameSelect');
        const ideaInput = document.getElementById('ideaInput');
        const addBtn = document.getElementById('addBtn');
        const ideasList = document.getElementById('ideasList');
        const ideaCountEl = document.getElementById('ideaCount');
        const contributorCountEl = document.getElementById('contributorCount');

        let ideas = [];
        let ideaCounter = 0;
        let likes = {}; // Structure: { ideaId: [person1, person2, ...] }

        addBtn.addEventListener('click', addIdea);
        ideaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addIdea();
            }
        });

        function addIdea() {
            const selectedName = nameSelect.value;
            const ideaText = ideaInput.value.trim();

            if (!selectedName) {
                alert('Please select your name');
                return;
            }

            if (!ideaText) {
                alert('Please enter an idea');
                return;
            }

            // Get the name from selected option
            const nameOption = nameSelect.options[nameSelect.selectedIndex];
            const displayName = nameOption.text;

            ideaCounter++;

            // Create idea object
            const idea = {
                id: ideaCounter,
                text: ideaText,
                author: displayName,
                authorValue: selectedName
            };

            ideas.push(idea);
            likes[ideaCounter] = [];

            // Remove empty state if it exists
            const emptyState = ideasList.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // Create new idea element
            const ideaElement = document.createElement('div');
            ideaElement.className = 'idea-item';
            ideaElement.id = `idea-${ideaCounter}`;
            ideaElement.innerHTML = `
                <div class="idea-number">${ideaCounter}</div>
                <div class="idea-content">
                    <div class="idea-item-text">${escapeHtml(ideaText)}</div>
                    <div class="idea-item-author">Suggested by ${displayName}</div>
                </div>
                <div class="idea-actions">
                    <button class="like-btn" onclick="toggleLike(${ideaCounter})">
                        <span>👍</span>
                        <span class="like-count" id="like-${ideaCounter}">0</span>
                    </button>
                    <button class="delete-btn" onclick="deleteIdea(${ideaCounter})">Delete</button>
                </div>
            `;

            // Add to list
            ideasList.appendChild(ideaElement);

            // Update stats
            updateStats();

            // Reset inputs
            nameSelect.value = '';
            ideaInput.value = '';
            ideaInput.focus();
        }

        function toggleLike(id) {
            const currentPerson = nameSelect.value;
            
            if (!currentPerson) {
                alert('Please select your name first');
                return;
            }
            
            if (!likes[id]) {
                likes[id] = [];
            }
            
            // Check if this person has already liked this idea
            const personIndex = likes[id].indexOf(currentPerson);
            
            if (personIndex > -1) {
                // Unlike - remove person's like
                likes[id].splice(personIndex, 1);
            } else {
                // Like - add person's like
                likes[id].push(currentPerson);
            }
            
            // Update like count
            const likeCountEl = document.getElementById(`like-${id}`);
            if (likeCountEl) {
                likeCountEl.textContent = likes[id].length;
            }
            
            // Add animation
            const likeBtn = document.querySelector(`#idea-${id} .like-btn`);
            if (likeBtn) {
                likeBtn.classList.add('liked');
                setTimeout(() => {
                    likeBtn.classList.remove('liked');
                }, 400);
            }
        }

        function deleteIdea(id) {
            if (confirm('Are you sure you want to delete this idea?')) {
                const ideaElement = document.getElementById(`idea-${id}`);
                if (ideaElement) {
                    ideaElement.style.animation = 'slideInRight 0.5s ease-out reverse';
                    setTimeout(() => {
                        ideaElement.remove();
                        ideas = ideas.filter(idea => idea.id !== id);
                        delete likes[id];
                        
                        // Show empty state if no ideas left
                        if (ideas.length === 0) {
                            ideasList.innerHTML = `
                                <div class="empty-state">
                                    <div class="empty-state-icon">💭</div>
                                    <div class="empty-state-text">No ideas yet. Be the first to share an idea!</div>
                                </div>
                            `;
                        }
                        
                        updateStats();
                    }, 300);
                }
            }
        }

        function updateStats() {
            ideaCountEl.textContent = ideas.length;
            
            // Count unique contributors
            const uniqueContributors = new Set(ideas.map(idea => idea.author)).size;
            contributorCountEl.textContent = uniqueContributors;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Make functions globally accessible
        window.deleteIdea = deleteIdea;
        window.toggleLike = toggleLike;

        // Clear all ideas functionality
        const clearAllBtn = document.getElementById('clearAllBtn');
        clearAllBtn.addEventListener('click', clearAllIdeas);

        function clearAllIdeas() {
            if (ideas.length === 0) {
                alert('No ideas to clear!');
                return;
            }

            if (confirm('Are you sure you want to clear all ideas? This action cannot be undone.')) {
                ideas = [];
                likes = {};
                ideaCounter = 0;
                
                ideasList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💭</div>
                        <div class="empty-state-text">No ideas yet. Be the first to share an idea!</div>
                    </div>
                `;
                
                updateStats();
            }
        }

        window.clearAllIdeas = clearAllIdeas;
    </script>
</body>
</html>
