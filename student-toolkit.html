<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --blue-deep: #0f2156;
  --blue-light: #1d4ed8;
  --blue-pale: #60a5fa;
  --blue-ghost: #93c5fd;
  --green: #22c55e;
  --green-dark: #16a34a;
  --bg-1: #010509;
  --bg-2: #03080f;
  --bg-3: #020710;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(29,78,216,0.2);
}

*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #010509;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── ANIMATED BACKGROUND ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(15,33,86,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(1,5,9,0.95) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 20%, rgba(2,7,16,0.92) 0%, transparent 55%),
    linear-gradient(160deg, #010509 0%, #030c18 40%, #020810 100%);
  z-index: 0;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(96,165,250,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(96,165,250,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 70%, rgba(29,78,216,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, rgba(96,165,250,0.1) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 50%, rgba(96,165,250,0.12) 0%, transparent 100%);
  z-index: 0;
  pointer-events: none;
  animation: starDrift 40s linear infinite;
}

@keyframes starDrift {
  0% { transform: translateY(0); }
  100% { transform: translateY(-30px); }
}

/* ─── NAVBAR ─── */

.navbar {
  position: relative;
  z-index: 10;
  background: rgba(10,20,60,0.4);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(29,78,216,0.25);
  padding: 0 40px;
  height: 68px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.navbar-brand .logo-img {
  width: 52px;
  height: 52px;
  object-fit: contain;
  border-radius: 12px;
  filter: drop-shadow(0 0 8px rgba(29,78,216,0.5));
}

.navbar-brand h2 {
  font-family: 'Poppins', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #93c5fd, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-buttons {
  display: flex;
  gap: 8px;
}

.nav-btn {
  padding: 9px 20px;
  border: 1px solid rgba(96,165,250,0.12);
  border-radius: 10px;
  background: rgba(15,33,86,0.3);
  color: rgba(96,165,250,0.8);
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.01em;
}

.nav-btn:hover,
.nav-btn.active-nav {
  background: rgba(29,78,216,0.2);
  border-color: rgba(93,169,253,0.5);
  color: white;
  box-shadow: 0 0 18px rgba(29,78,216,0.2);
}

/* ─── LAYOUT ─── */

.layout {
  position: relative;
  z-index: 1;
  display: flex;
  padding: 36px 40px;
  gap: 28px;
  min-height: calc(100vh - 68px);
}

/* ─── SIDEBAR ─── */

.sidebar {
  width: 240px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sidebar-header {
  font-family: 'Poppins', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(96,165,250,0.5);
  margin-bottom: 6px;
  padding-left: 4px;
}

.event {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(29,78,216,0.15);
  border-left: 3px solid;
  border-left-color: var(--blue-light);
  padding: 14px 16px;
  border-radius: 12px;
  transition: all 0.25s ease;
  cursor: default;
}

.event:nth-child(2) { border-left-color: #22c55e; }
.event:nth-child(3) { border-left-color: #f59e0b; }
.event:nth-child(4) { border-left-color: #ec4899; }
.event:nth-child(5) { border-left-color: #06b6d4; }

.event:hover {
  background: rgba(15,33,86,0.25);
  border-color: rgba(96,165,250,0.12);
  transform: translateX(3px);
}

.event-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(96,165,250,0.5);
  margin-bottom: 3px;
}

.event-name {
  font-size: 0.85rem;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
}

.event-date {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

/* ─── MAIN ─── */

.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* ─── CARD ─── */

.card {
  width: 460px;
  background: rgba(3,10,28,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 36px;
  animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #93c5fd, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title span { font-size: 1.3rem; }

/* ─── GPA CARD ─── */

#gpa.card {
  width: 660px;
}

/* ─── COURSE ROWS ─── */

#courses {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 4px;
}

#courses::-webkit-scrollbar { width: 4px; }
#courses::-webkit-scrollbar-track { background: transparent; }
#courses::-webkit-scrollbar-thumb { background: rgba(29,78,216,0.2); border-radius: 4px; }

.row {
  display: flex;
  gap: 10px;
  animation: rowIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes rowIn {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}

.row-num {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  flex-shrink: 0;
  font-size: 0.7rem;
  color: rgba(96,165,250,0.2);
  font-weight: 600;
}

.row input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(29,78,216,0.2);
  background: rgba(5,15,40,0.6);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 0.88rem;
  transition: all 0.2s ease;
  outline: none;
}

.row input::placeholder { color: rgba(255,255,255,0.25); }

.row input:focus {
  border-color: rgba(29,78,216,0.6);
  background: rgba(15,33,86,0.25);
  box-shadow: 0 0 0 3px rgba(29,78,216,0.2);
}

/* ─── BUTTONS ─── */

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

.btn {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.02em;
}

.btn-add {
  background: rgba(15,33,86,0.4);
  border: 1px solid rgba(29,78,216,0.2);
  color: var(--blue-pale);
}

.btn-add:hover {
  background: rgba(29,78,216,0.5);
  border-color: rgba(93,169,253,0.5);
  color: white;
}

.btn-calc {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3);
}

.btn-calc:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(34,197,94,0.45);
}

.btn-calc:active {
  transform: translateY(0);
}

/* ─── RESULT BOX ─── */

#result {
  margin-top: 20px;
  padding: 20px 24px;
  border-radius: 14px;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  display: none;
}

#result.visible { display: block; animation: cardIn 0.3s ease forwards; }

.result-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(34,197,94,0.7);
  margin-bottom: 4px;
}

.result-value {
  font-family: 'Poppins', sans-serif;
  font-size: 2.6rem;
  font-weight: 800;
  color: #4ade80;
  letter-spacing: -0.04em;
  line-height: 1;
}

.result-status {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}

/* ─── TIMER CARD ─── */

#timer.card {
  width: 380px;
}

.timer-mode-row {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
}

.mode-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid rgba(29,78,216,0.2);
  background: transparent;
  color: rgba(96,165,250,0.5);
  font-family: 'Poppins', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.03em;
}

.mode-btn.active-mode {
  background: rgba(15,33,86,0.5);
  border-color: rgba(29,78,216,0.5);
  color: var(--blue-pale);
}

/* Timer ring */
.timer-ring-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto 28px;
}

.timer-ring-wrap svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}

.ring-bg { fill: none; stroke: rgba(29,78,216,0.15); stroke-width: 6; }

.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 565.48;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}

.timer-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.timer-display {
  font-family: 'Poppins', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, #93c5fd, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
}

.timer-sub {
  font-size: 0.7rem;
  color: rgba(96,165,250,0.4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 4px;
}

.timer-buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
}

.t-btn {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  border: 1px solid rgba(29,78,216,0.2);
  background: rgba(15,33,86,0.3);
  color: var(--blue-pale);
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.t-btn.play {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #1d4ed8, #0f2156);
  border: none;
  color: white;
  font-size: 1.3rem;
  box-shadow: 0 4px 20px rgba(15,33,86,0.7);
}

.t-btn:hover { transform: scale(1.08); }
.t-btn.play:hover { box-shadow: 0 6px 30px rgba(15,33,86,0.9); }

.session-info {
  text-align: center;
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 24px;
}

.sess-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.sess-val {
  font-family: 'Poppins', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--blue-pale);
}

.sess-label {
  font-size: 0.68rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* SECTION hide/show */
.section { display: none; }
.section.active { display: block; }

/* ─── LIGHT MODE ─── */
body.light {
  background: #e8f0fe;
  color: #0f172a;
}
body.light::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(219,234,254,0.8) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 20%, rgba(191,219,254,0.6) 0%, transparent 55%),
    linear-gradient(160deg, #dbeafe 0%, #eff6ff 40%, #e0f2fe 100%);
}
body.light::after { display: none; }
body.light .navbar {
  background: rgba(255,255,255,0.75);
  border-bottom: 1px solid rgba(59,130,246,0.2);
}
body.light .navbar-brand h2 {
  background: linear-gradient(90deg, #1d4ed8, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.light .nav-btn {
  background: rgba(59,130,246,0.08);
  border-color: rgba(59,130,246,0.2);
  color: #1d4ed8;
}
body.light .nav-btn:hover,
body.light .nav-btn.active-nav {
  background: rgba(29,78,216,0.15);
  border-color: rgba(29,78,216,0.4);
  color: #0f2156;
  box-shadow: 0 0 18px rgba(59,130,246,0.2);
}
body.light .sidebar-header { color: rgba(29,78,216,0.6); }
body.light .event {
  background: rgba(255,255,255,0.7);
  border-color: rgba(59,130,246,0.15);
}
body.light .event:hover { background: rgba(219,234,254,0.8); }
body.light .event-label { color: rgba(29,78,216,0.6); }
body.light .event-name { color: #0f172a; }
body.light .event-date { color: rgba(15,23,42,0.45); }
body.light .card {
  background: rgba(255,255,255,0.75);
  border-color: rgba(59,130,246,0.15);
}
body.light .card-title {
  background: linear-gradient(135deg, #1e3a8a, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.light .row-num { color: rgba(29,78,216,0.4); }
body.light .row input {
  background: rgba(239,246,255,0.8);
  border-color: rgba(59,130,246,0.2);
  color: #0f172a;
}
body.light .row input::placeholder { color: rgba(15,23,42,0.3); }
body.light .row input:focus {
  background: #fff;
  border-color: rgba(29,78,216,0.5);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}
body.light .btn-add {
  background: rgba(59,130,246,0.1);
  border-color: rgba(59,130,246,0.3);
  color: #1d4ed8;
}
body.light .btn-add:hover { background: rgba(29,78,216,0.15); color: #0f2156; }
body.light .mode-btn {
  border-color: rgba(59,130,246,0.2);
  color: rgba(29,78,216,0.55);
}
body.light .mode-btn.active-mode {
  background: rgba(59,130,246,0.12);
  border-color: rgba(29,78,216,0.4);
  color: #1d4ed8;
}
body.light .ring-bg { stroke: rgba(59,130,246,0.15); }
body.light .timer-display {
  background: linear-gradient(135deg, #1e3a8a, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.light .timer-sub { color: rgba(29,78,216,0.45); }
body.light .t-btn {
  border-color: rgba(59,130,246,0.3);
  background: rgba(59,130,246,0.08);
  color: #1d4ed8;
}
body.light .sess-val { color: #1d4ed8; }
body.light .sess-label { color: rgba(15,23,42,0.4); }
body.light #result {
  background: rgba(34,197,94,0.06);
  border-color: rgba(34,197,94,0.2);
}

/* ─── THEME TOGGLE SWITCH ─── */
.theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 16px;
}
.toggle-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: rgba(96,165,250,0.7);
  letter-spacing: 0.05em;
  user-select: none;
  transition: color 0.3s;
}
body.light .toggle-label { color: rgba(29,78,216,0.6); }
.toggle-switch {
  position: relative;
  width: 48px;
  height: 26px;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  border-radius: 13px;
  background: rgba(15,33,86,0.6);
  border: 1px solid rgba(29,78,216,0.4);
  transition: all 0.35s ease;
}
body.light .toggle-track {
  background: rgba(219,234,254,0.9);
  border-color: rgba(59,130,246,0.35);
}
.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  line-height: 1;
}
.toggle-switch input:checked ~ .toggle-thumb {
  transform: translateX(22px);
}

</style>
</head>
<body>

<!-- NAVBAR -->

        <div class="row">
          <div class="row-num">2</div>
          <input type="text" placeholder="Credits">
          <input type="text" placeholder="Grade (A, B+, 3.5…)">
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px;">
        <button class="btn btn-add" onclick="addCourse()">+ Add Course</button>
        <button class="btn btn-calc" onclick="calcGPA()">Calculate GPA</button>
      </div>

      <div id="result">
        <div class="result-label">Your GPA</div>
        <div class="result-value" id="gpa-val">—</div>
        <div class="result-status" id="gpa-status"></div>
      </div>
    </div>

    <!-- TIMER CARD -->
    <div class="card section" id="timer">
      <div class="card-title"><span>⏱</span> Study Timer</div>

      <div class="timer-mode-row">
        <button class="mode-btn active-mode" onclick="setMode(25,'Focus',this)">Focus · 25m</button>
        <button class="mode-btn" onclick="setMode(5,'Short Break',this)">Break · 5m</button>
        <button class="mode-btn" onclick="setMode(15,'Long Break',this)">Long · 15m</button>
      </div>

      <div class="timer-ring-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#0f2156"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="100" cy="100" r="90"/>
          <circle class="ring-fill" id="ring" cx="100" cy="100" r="90"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-display" id="time">25:00</div>
          <div class="timer-sub" id="timer-mode-label">Focus</div>
        </div>
      </div>

      <div class="timer-buttons">
        <button class="t-btn" onclick="reset()" title="Reset">↺</button>
        <button class="t-btn play" id="play-btn" onclick="togglePlay()">▶</button>
        <button class="t-btn" onclick="skipSession()" title="Skip">⏭</button>
      </div>

      <div class="session-info">
        <div class="sess-item">
          <div class="sess-val" id="sess-count">0</div>
          <div class="sess-label">Sessions</div>
        </div>
        <div class="sess-item">
          <div class="sess-val" id="total-mins">0m</div>
          <div class="sess-label">Focused</div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /layout -->

<script>

/* ── THEME TOGGLE ── */
function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.toggle('light');
  const checkbox = document.getElementById('theme-checkbox');
  const label = document.getElementById('theme-label');
  const thumb = document.getElementById('toggle-thumb');
  checkbox.checked = isLight;
  label.textContent = isLight ? 'LIGHT' : 'DARK';
  thumb.textContent = isLight ? '☀️' : '🌙';
}

/* ── NAVIGATION ── */
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
  if (btn) btn.classList.add('active-nav');
}

/* ── GPA ── */
let courseCount = 2;

function addCourse() {
  courseCount++;
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <div class="row-num">${courseCount}</div>
    <input type="text" placeholder="Credits">
    <input type="text" placeholder="Grade (A, B+, 3.5…)">
  `;
  document.getElementById('courses').appendChild(div);
  div.querySelector('input').focus();
}

function gradeToPoint(g) {
  g = g.trim().toUpperCase();
  const grades = { 'A+':4,'A':4,'A-':3.7,'B+':3.3,'B':3,'B-':2.7,'C+':2.3,'C':2,'C-':1.7,'D':1,'F':0 };
  return grades[g] !== undefined ? grades[g] : parseFloat(g);
}

function gpaStatus(gpa) {
  if (gpa >= 3.7) return '🏆 Dean\'s List — Outstanding!';
  if (gpa >= 3.3) return '⭐ Great standing — Keep it up!';
  if (gpa >= 3.0) return '✅ Good standing';
  if (gpa >= 2.0) return '📚 Satisfactory — Room to grow';
  return '⚠️ Below average — Let\'s work harder';
}

function calcGPA() {
  const rows = document.querySelectorAll('#courses .row');
  let totalPoints = 0, totalCredits = 0;
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const credits = parseFloat(inputs[0].value);
    const grade = gradeToPoint(inputs[1].value);
    if (!isNaN(credits) && !isNaN(grade)) {
      totalPoints += credits * grade;
      totalCredits += credits;
    }
  });
  const resultEl = document.getElementById('result');
  if (totalCredits === 0) {
    resultEl.classList.remove('visible');
    return;
  }
  const gpa = (totalPoints / totalCredits).toFixed(2);
  document.getElementById('gpa-val').textContent = gpa;
  document.getElementById('gpa-status').textContent = gpaStatus(parseFloat(gpa));
  resultEl.classList.add('visible');
}

/* ── TIMER ── */
let totalSeconds = 1500;
let secondsLeft  = 1500;
let interval     = null;
let isRunning    = false;
let sessions     = 0;
let totalFocused = 0;

const CIRCUMFERENCE = 2 * Math.PI * 90; // 565.48

function updateRing() {
  const frac = secondsLeft / totalSeconds;
  const offset = CIRCUMFERENCE * (1 - frac);
  document.getElementById('ring').style.strokeDashoffset = offset;
}

function updateDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  document.getElementById('time').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  updateRing();
}

function setMode(mins, label, btn) {
  pause();
  totalSeconds = mins * 60;
  secondsLeft  = totalSeconds;
  document.getElementById('timer-mode-label').textContent = label;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
  btn.classList.add('active-mode');
  updateDisplay();
  document.getElementById('play-btn').textContent = '▶';
}

function togglePlay() {
  if (isRunning) pause();
  else start();
}

function start() {
  if (interval) return;
  isRunning = true;
  document.getElementById('play-btn').textContent = '⏸';
  interval = setInterval(() => {
    if (secondsLeft <= 0) {
      clearInterval(interval); interval = null; isRunning = false;
      document.getElementById('play-btn').textContent = '▶';
      sessions++;
      const modeLabel = document.getElementById('timer-mode-label').textContent;
      if (modeLabel === 'Focus') {
        totalFocused += Math.round(totalSeconds / 60);
      }
      document.getElementById('sess-count').textContent = sessions;
      document.getElementById('total-mins').textContent = totalFocused + 'm';
      return;
    }
    secondsLeft--;
    updateDisplay();
  }, 1000);
}

function pause() {
  clearInterval(interval);
  interval = null;
  isRunning = false;
  document.getElementById('play-btn').textContent = '▶';
}

function reset() {
  pause();
  secondsLeft = totalSeconds;
  updateDisplay();
}

function skipSession() {
  pause();
  secondsLeft = 0;
  updateDisplay();
}

updateRing();
</script>
</body>
</html>
